# Este arquivo é mesclado automaticamente pelo Docker Compose sempre que
# rodarmos "docker-compose up" sem passar "-f" explicitamente. Na EC2,
# o comando de deploy usa "-f docker-compose.yml" direto, o que ignora
# este arquivo por completo. Ele nunca deve chegar em produção.
services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: postgres-flashcards
    restart: unless-stopped
    environment:
      POSTGRES_DB: flashcards_db
      POSTGRES_USER: flashcards_admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    depends_on:
      - db
      - python-services
    environment:
      # Sobrescreve o que estiver no backend/.env: dentro da rede do
      # Compose local, o backend precisa falar com "db" (nome do serviço),
      # não "localhost" nem a porta 5434 (essa só existe fora do container).
      DB_URL: jdbc:postgresql://db:5432/flashcards_db
      DB_USERNAME: flashcards_admin
      DB_PASSWORD: password123
      PYTHON_SERVICE_URL: http://python-services:8000

volumes:
  postgres_data:
