#PADRAO ISO-8859-1
#USAR ACENTOS NESSE ARQUIVO PODE IMPEDIR QUE A APLICAÇÃO RODE

spring.application.name=backend

#--- CONFIG NEON DB ---
#1. URL LIMPA
#Apenas endereco e configs de SSL/, SEM POOLER (Spring Boot ja possui o HikariCP)
#Se existir .env, injeta a DB_URL do Neon e usa ela.
#Se nao achar nada (caso do tester), ele conecta no Docker local.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/flashcards_db}
#2. Credenciais SEPARADAS
#Tenta a variavel do Neon. Se nao achar, usa o usuario de teste do Docker.
spring.datasource.username=${DB_USERNAME:flashcards_admin}
#Tenta a senha do Neon. Se nao achar, usa a senha de teste do Docker.
spring.datasource.password=${DB_PASSWORD:password123}

#--- CONFIG DRIVER ---
spring.datasource.driver-class-name=org.postgresql.Driver

#--- CONFIG FLYWAY ---
#Ligado: tudo que estiver em db.migration é executado dentro do BD.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#--- CONFIG HIBERNATE (JPA) ---
#Verifica se o que existe no BD eh igual ao mapping das entidades dentro do Java
spring.jpa.hibernate.ddl-auto=validate
#Mostra no console todas as queries executadas, desativar se quiser
spring.jpa.show-sql=true
spring.jpa.database=POSTGRESQL

#--- SWAGGER / OPENAPI ---
#Evita erro 500 com Pageable/Sort do Spring Data
springdoc.model-converters.pageable-converter.enabled=true


#-------- OPCIONAIS: comentar para debugar se necessario --------

#Garante que o Logger do Hibernate fique quieto (apenas erros)
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

#Esconder stack trace
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
